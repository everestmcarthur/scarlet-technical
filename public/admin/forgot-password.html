<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Scarlet Technical</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--scarlet:#C41E3A;--scarlet-dark:#9E1830;--ink:#111;--muted:#6B7280;--border:#E5E7EB;--paper:#FAFAFA}
body{font-family:'Inter',sans-serif;background:var(--paper);display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--ink)}
.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.logo{display:flex;align-items:center;gap:.6rem;margin-bottom:2rem}
.logo-icon{width:40px;height:40px;background:var(--scarlet);border-radius:10px;display:flex;align-items:center;justify-content:center}
.logo-text{font-weight:700;font-size:1.1rem}
.logo-text span{color:var(--scarlet)}
h1{font-size:1.4rem;font-weight:700;margin-bottom:.4rem}
.subtitle{color:var(--muted);font-size:.9rem;margin-bottom:1.75rem;line-height:1.4}
label{display:block;font-size:.85rem;font-weight:600;margin-bottom:.4rem;color:var(--ink)}
input{display:block;width:100%;padding:.7rem .9rem;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:.95rem;outline:none;transition:border-color .15s}
input:focus{border-color:var(--scarlet)}
.field{margin-bottom:1.25rem}
.btn{width:100%;padding:.85rem;background:var(--scarlet);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:.5rem}
.btn:hover{background:var(--scarlet-dark)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.error{background:#FDF2F4;color:var(--scarlet);border:1px solid #FECDD3;padding:.7rem .9rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem;display:none}
.success{background:#F0FDF4;color:#16a34a;border:1px solid #BBF7D0;padding:.7rem .9rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem;display:none}
.back-link{display:inline-block;margin-top:1rem;color:var(--muted);font-size:.85rem;text-decoration:none}
.back-link:hover{color:var(--scarlet)}

/* Reset form (hidden by default) */
#resetSection{display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    </div>
    <div class="logo-text">Scarlet <span>Technical</span></div>
  </div>

  <!-- Step 1: Request reset -->
  <div id="requestSection">
    <h1>Forgot Password</h1>
    <p class="subtitle">Enter your admin email. We'll send a password reset link.</p>
    <div id="requestError" class="error"></div>
    <div id="requestSuccess" class="success"></div>
    <form id="requestForm">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="resetEmail" required placeholder="admin@example.com" autocomplete="email">
      </div>
      <button type="submit" class="btn" id="requestBtn">Send Reset Link</button>
    </form>
    <a href="/admin/login" class="back-link">← Back to login</a>
  </div>

  <!-- Step 2: Enter new password (shown via reset token in URL) -->
  <div id="resetSection">
    <h1>Reset Password</h1>
    <p class="subtitle">Enter your new password below.</p>
    <div id="resetError" class="error"></div>
    <div id="resetSuccess" class="success"></div>
    <form id="resetForm">
      <div class="field">
        <label>New Password</label>
        <input type="password" id="newPassword" required placeholder="••••••••" minlength="8" autocomplete="new-password">
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" required placeholder="••••••••" autocomplete="new-password">
      </div>
      <button type="submit" class="btn" id="resetBtn">Reset Password</button>
    </form>
    <a href="/admin/login" class="back-link">← Back to login</a>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

// If there's a token in the URL, show the reset form
if (token) {
  document.getElementById('requestSection').style.display = 'none';
  document.getElementById('resetSection').style.display = 'block';
}

// Step 1: Request password reset
document.getElementById('requestForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('requestBtn');
  const errEl = document.getElementById('requestError');
  const successEl = document.getElementById('requestSuccess');
  btn.disabled = true; btn.textContent = 'Sending...';
  errEl.style.display = 'none'; successEl.style.display = 'none';
  try {
    const res = await fetch('/admin/forgot-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email: document.getElementById('resetEmail').value })
    });
    const data = await res.json();
    if (data.success) {
      successEl.textContent = 'If that email exists, a reset link has been sent. Check your inbox.';
      successEl.style.display = 'block';
      document.getElementById('requestForm').style.display = 'none';
    } else {
      errEl.textContent = data.error || 'Failed to send reset email';
      errEl.style.display = 'block';
    }
  } catch (e) { errEl.textContent = 'Network error'; errEl.style.display = 'block'; }
  btn.disabled = false; btn.textContent = 'Send Reset Link';
});

// Step 2: Reset password with token
document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('resetBtn');
  const errEl = document.getElementById('resetError');
  const successEl = document.getElementById('resetSuccess');
  const newPass = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;

  if (newPass !== confirm) { errEl.textContent = 'Passwords do not match'; errEl.style.display = 'block'; return; }
  if (newPass.length < 8) { errEl.textContent = 'Password must be at least 8 characters'; errEl.style.display = 'block'; return; }

  btn.disabled = true; btn.textContent = 'Resetting...';
  errEl.style.display = 'none'; successEl.style.display = 'none';
  try {
    const res = await fetch('/admin/reset-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ token, new_password: newPass })
    });
    const data = await res.json();
    if (data.success) {
      successEl.textContent = 'Password reset successfully! Redirecting to login...';
      successEl.style.display = 'block';
      document.getElementById('resetForm').style.display = 'none';
      setTimeout(() => window.location.href = '/admin/login', 2000);
    } else {
      errEl.textContent = data.error || 'Reset failed';
      errEl.style.display = 'block';
    }
  } catch (e) { errEl.textContent = 'Network error'; errEl.style.display = 'block'; }
  btn.disabled = false; btn.textContent = 'Reset Password';
});
</script>
</body>
</html>
