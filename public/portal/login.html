<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Portal — Scarlet Technical</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--scarlet:#C41E3A;--scarlet-dark:#9E1830;--scarlet-light:#FDF2F4;--ink:#111;--muted:#6B7280;--border:#E5E7EB;--paper:#FAFAFA}
body{font-family:'Inter',sans-serif;background:var(--paper);min-height:100vh;display:flex;flex-direction:column;color:var(--ink)}
nav{background:#fff;border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:.6rem;text-decoration:none;color:var(--ink)}
.brand-icon{width:36px;height:36px;background:var(--scarlet);border-radius:8px;display:flex;align-items:center;justify-content:center}
.brand-name{font-weight:700;font-size:1.1rem}.brand-name span{color:var(--scarlet)}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
h1{font-size:1.5rem;font-weight:800;margin-bottom:.4rem}
.subtitle{color:var(--muted);font-size:.9rem;margin-bottom:2rem;line-height:1.5}
label{display:block;font-size:.85rem;font-weight:600;margin-bottom:.4rem}
input{display:block;width:100%;padding:.75rem .9rem;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:.95rem;outline:none;transition:border-color .15s}
input:focus{border-color:var(--scarlet)}
.field{margin-bottom:1.25rem}
.btn{width:100%;padding:.875rem;background:var(--scarlet);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:.25rem}
.btn:hover{background:var(--scarlet-dark)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.error{background:var(--scarlet-light);color:var(--scarlet);border:1px solid #FECDD3;padding:.75rem .9rem;border-radius:8px;font-size:.875rem;margin-bottom:1.25rem;display:none}
.back{display:inline-flex;align-items:center;gap:.4rem;color:var(--muted);text-decoration:none;font-size:.875rem;margin-top:1.25rem}
.back:hover{color:var(--ink)}
footer{text-align:center;padding:1.5rem;font-size:.75rem;color:var(--muted);border-top:1px solid var(--border);background:#fff}
</style>
</head>
<body>
<nav>
  <a href="/" class="brand">
    <div class="brand-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
    <span class="brand-name">Scarlet <span>Technical</span></span>
  </a>
</nav>
<div class="main">
  <div class="card">
    <h1>Customer Portal</h1>
    <p class="subtitle">Log in to view your repairs, payment plan, and account.</p>
    <div id="error" class="error"></div>

    <!-- Login mode tabs -->
    <div style="display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:1.5rem;">
      <button id="tab-email" onclick="setMode('email')" style="flex:1;padding:.6rem;background:var(--scarlet);color:#fff;border:none;font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s;">Email</button>
      <button id="tab-phone" onclick="setMode('phone')" style="flex:1;padding:.6rem;background:#fff;color:var(--muted);border:none;font-family:inherit;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;">Phone Number</button>
    </div>

    <form id="form">
      <div class="field" id="email-field">
        <label>Email Address</label>
        <input type="text" id="email" placeholder="you@email.com" autocomplete="username">
      </div>
      <div class="field" id="phone-field" style="display:none;">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="(555) 555-5555" autocomplete="tel">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn" id="btn">Sign In</button>
    </form>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:1rem;font-size:.85rem;">
      <a href="/portal/forgot-password" style="color:var(--muted);text-decoration:none;" onmouseover="this.style.color='var(--scarlet)'" onmouseout="this.style.color='var(--muted)'">Forgot password?</a>
      <a href="/portal/register" style="color:var(--scarlet);font-weight:600;text-decoration:none;">Create account</a>
    </div>
    <a href="/" class="back">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Scarlet Technical
    </a>
  </div>
</div>
<footer>&copy; 2026 Scarlet Technical · Muncie, Indiana</footer>
<script>
let loginMode = 'email';
function setMode(mode) {
  loginMode = mode;
  document.getElementById('email-field').style.display = mode === 'email' ? '' : 'none';
  document.getElementById('phone-field').style.display = mode === 'phone' ? '' : 'none';
  document.getElementById('tab-email').style.background = mode === 'email' ? '#C41E3A' : '#fff';
  document.getElementById('tab-email').style.color = mode === 'email' ? '#fff' : '#6B7280';
  document.getElementById('tab-phone').style.background = mode === 'phone' ? '#C41E3A' : '#fff';
  document.getElementById('tab-phone').style.color = mode === 'phone' ? '#fff' : '#6B7280';
}

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('error');
  btn.disabled = true; btn.textContent = 'Signing in...';
  err.style.display = 'none';
  const password = document.getElementById('password').value;
  try {
    let url, body;
    if (loginMode === 'phone') {
      const phone = document.getElementById('phone').value.trim();
      if (!phone) { err.textContent = 'Phone number required'; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Sign In'; return; }
      url = '/portal/login-phone';
      body = { phone, password };
    } else {
      const email = document.getElementById('email').value.trim();
      if (!email) { err.textContent = 'Email required'; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Sign In'; return; }
      url = '/portal/login';
      body = { email, password };
    }
    const res = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.success) { window.location.href = '/portal'; }
    else if (data.error === 'suspended') {
      err.innerHTML = '<strong>Account Suspended</strong><br>' + (data.message || 'Your account has been suspended. Please contact Scarlet Technical to resolve this.');
      err.style.display = 'block';
      err.style.background = '#FEF2F2'; err.style.color = '#991B1B'; err.style.borderColor = '#FECACA';
    }
    else { err.textContent = data.error || 'Invalid credentials'; err.style.display = 'block'; }
  } catch(e) { err.textContent = 'Network error — please try again'; err.style.display = 'block'; }
  btn.disabled = false; btn.textContent = 'Sign In';
});
</script>
<script>
// Maintenance mode check
(function() {
  fetch('/api/public-settings').then(r => r.json()).then(function(s) {
    if (s && s.maintenance_mode === 'true') {
      var wrap = document.querySelector('.card') || document.body;
      var msg = document.createElement('div');
      msg.style.cssText = 'background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:16px 20px;margin-bottom:16px;font-size:14px;color:#92400e;text-align:center';
      msg.innerHTML = '<strong>⚠ Scheduled Maintenance</strong><br><span style="font-size:13px">' + (s.maintenance_message || 'We are performing maintenance. Please check back shortly.') + '</span>';
      if (wrap.parentNode) wrap.parentNode.insertBefore(msg, wrap);
    }
  }).catch(function(){});
})();
</script>
</body>
</html>
