<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — Scarlet Technical</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--scarlet:#C41E3A;--scarlet-dark:#9E1830;--scarlet-light:#FDF2F4;--ink:#111;--muted:#6B7280;--border:#E5E7EB;--paper:#FAFAFA}
body{font-family:'Inter',sans-serif;background:var(--paper);min-height:100vh;display:flex;flex-direction:column;color:var(--ink)}
nav{background:#fff;border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:.6rem;text-decoration:none;color:var(--ink)}
.brand-icon{width:36px;height:36px;background:var(--scarlet);border-radius:8px;display:flex;align-items:center;justify-content:center}
.brand-name{font-weight:700;font-size:1.1rem}.brand-name span{color:var(--scarlet)}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:440px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
h1{font-size:1.5rem;font-weight:800;margin-bottom:.4rem}
.subtitle{color:var(--muted);font-size:.9rem;margin-bottom:1.75rem;line-height:1.5}
label{display:block;font-size:.85rem;font-weight:600;margin-bottom:.4rem}
input{display:block;width:100%;padding:.75rem .9rem;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:.95rem;outline:none;transition:border-color .15s}
input:focus{border-color:var(--scarlet)}
.field{margin-bottom:1.1rem}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.1rem}
.btn{width:100%;padding:.875rem;background:var(--scarlet);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:.25rem}
.btn:hover{background:var(--scarlet-dark)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.error{background:var(--scarlet-light);color:var(--scarlet);border:1px solid #FECDD3;padding:.75rem .9rem;border-radius:8px;font-size:.875rem;margin-bottom:1.25rem;display:none}
.login-link{text-align:center;margin-top:1.25rem;font-size:.875rem;color:var(--muted)}
.login-link a{color:var(--scarlet);font-weight:600;text-decoration:none}
.back{display:inline-flex;align-items:center;gap:.4rem;color:var(--muted);text-decoration:none;font-size:.875rem;margin-top:1rem}
.back:hover{color:var(--ink)}
footer{text-align:center;padding:1.5rem;font-size:.75rem;color:var(--muted);border-top:1px solid var(--border);background:#fff}
@media(max-width:480px){.field-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
  <a href="/" class="brand">
    <div class="brand-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
    <span class="brand-name">Scarlet <span>Technical</span></span>
  </a>
</nav>
<div class="main">
  <div class="card">
    <h1>Create Account</h1>
    <p class="subtitle">Set up your customer portal account to track repairs, payments, and more.</p>
    <div id="error" class="error"></div>
    <form id="form">
      <div class="field-row">
        <div class="field">
          <label>First Name *</label>
          <input type="text" id="first-name" required placeholder="Jane" autocomplete="given-name">
        </div>
        <div class="field">
          <label>Last Name *</label>
          <input type="text" id="last-name" required placeholder="Smith" autocomplete="family-name">
        </div>
      </div>
      <div class="field">
        <label>Email Address *</label>
        <input type="email" id="email" required placeholder="you@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="(765) 555-0100" autocomplete="tel">
      </div>
      <div class="field">
        <label>Password *</label>
        <input type="password" id="password" required placeholder="At least 6 characters" autocomplete="new-password">
      </div>
      <div class="field">
        <label>Confirm Password *</label>
        <input type="password" id="confirm" required placeholder="Repeat password" autocomplete="new-password">
      </div>
      <button type="submit" class="btn" id="btn">Create Account</button>
    </form>
    <p class="login-link">Already have an account? <a href="/portal/login">Sign in</a></p>
    <a href="/" class="back">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Scarlet Technical
    </a>
  </div>
</div>
<footer>&copy; 2026 Scarlet Technical · Muncie, Indiana</footer>
<script>
document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('error');
  err.style.display = 'none';
  const firstName = document.getElementById('first-name').value.trim();
  const lastName = document.getElementById('last-name').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const pw = document.getElementById('password').value;
  const conf = document.getElementById('confirm').value;
  if (!firstName || !lastName) { err.textContent = 'First and last name required.'; err.style.display = 'block'; return; }
  if (!email) { err.textContent = 'Email address required.'; err.style.display = 'block'; return; }
  if (pw.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.style.display = 'block'; return; }
  if (pw !== conf) { err.textContent = 'Passwords do not match.'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Creating account...';
  try {
    const res = await fetch('/portal/api/register', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name: firstName + ' ' + lastName, email, phone: phone||null, password: pw })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/portal';
    } else {
      err.textContent = data.error || 'Registration failed. Please try again.';
      err.style.display = 'block';
    }
  } catch(e) { err.textContent = 'Network error. Please try again.'; err.style.display = 'block'; }
  btn.disabled = false; btn.textContent = 'Create Account';
});
</script>
</body>
</html>
